name: Strapi CI/CD

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      ECR_REPO_NAME: strapi-repo
      CLUSTER_NAME: strapi-cluster
      SERVICE_NAME: strapi-service

    steps:
      #  Checkout code
      - name: Checkout repository
        uses: actions/checkout@v3

      #  Configure AWS credentials
      - name: AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      #  Login to ECR
      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      # Build and push Docker image
      - name: Build and Push Docker image
        run: |
          IMAGE_TAG=${GITHUB_SHA::8}
          echo "Building Docker image with tag $IMAGE_TAG"
          docker build -t $ECR_REPO_NAME:$IMAGE_TAG ./strapi
          docker tag $ECR_REPO_NAME:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME:$IMAGE_TAG
          docker push $AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME:$IMAGE_TAG

      #  Update ECS service with new image
      - name: Deploy ECS service
        run: |
          IMAGE_URI=$AWS_ACCOUNT_ID.dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPO_NAME:${GITHUB_SHA::8}
          aws ecs update-service \
            --cluster $CLUSTER_NAME \
            --service $SERVICE_NAME \
            --force-new-deployment \
            --region $AWS_REGION

      #  Terraform setup
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      # Terraform Init & Apply
      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve \
            -var "db_username=${{ secrets.DB_USERNAME }}" \
            -var "db_password=${{ secrets.DB_PASSWORD }}" \
            -var "db_name=${{ secrets.DB_NAME }}" \
            -var "app_keys=${{ secrets.APP_KEYS }}" \
            -var "api_token_salt=${{ secrets.API_TOKEN_SALT }}" \
            -var "admin_jwt_secret=${{ secrets.ADMIN_JWT_SECRET }}" \
            -var "jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var "execution_role_arn=${{ secrets.EXECUTION_ROLE_ARN }}" \
            -var "task_role_arn=${{ secrets.TASK_ROLE_ARN }}"
