name: Strapi CD - Terraform & ECS Deploy

on:
  workflow_dispatch:  # Trigger manually or via CI using repository_dispatch

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
      IMAGE_URI: ${{ secrets.IMAGE_URI }}   # Pass the image URI from CI

    steps:
      # Checkout repo
      - name: Checkout
        uses: actions/checkout@v3

      # AWS credentials
      - name: AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # Terraform setup
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      # Terraform init & apply
      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve \
            -var "db_username=${{ secrets.DB_USERNAME }}" \
            -var "db_password=${{ secrets.DB_PASSWORD }}" \
            -var "db_name=${{ secrets.DB_NAME }}" \
            -var "app_keys=${{ secrets.APP_KEYS }}" \
            -var "api_token_salt=${{ secrets.API_TOKEN_SALT }}" \
            -var "admin_jwt_secret=${{ secrets.ADMIN_JWT_SECRET }}" \
            -var "jwt_secret=${{ secrets.JWT_SECRET }}" \
            -var "execution_role_arn=${{ secrets.EXECUTION_ROLE_ARN }}" \
            -var "task_role_arn=${{ secrets.TASK_ROLE_ARN }}" \
            -var "ecr_url=$IMAGE_URI"  # Pass Docker image URI
